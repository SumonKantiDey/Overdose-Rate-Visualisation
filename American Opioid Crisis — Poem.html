      <h1 class="poem-title">American Opioid Crisis</h1>
      <p class="poem-byline">By Sumon Kanti Dey, Dennis Sun, and Avery Mattoon</p>
    </header>

    <div class="poem-body">
      <svg id="poem-svg" viewBox="0 0 1200 1336" preserveAspectRatio="xMidYMid meet"><g transform="translate(0, 8)"><text x="0" y="32" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">The numbers rise, and rise again</text><text x="0" y="64" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Each spike means more souls lost</text><text x="0" y="96" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Lives gone at a heavy cost</text><text x="0" y="128" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">The line goes up year by year</text><text x="0" y="160" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">The loss never feels less severe.</text><line x1="0" x2="1180" y1="212" y2="212" stroke="#e0dbd2" stroke-width="0.75"></line></g><g transform="translate(0, 400)"><text x="0" y="32" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">The smell of destitution pulls me in</text><text x="0" y="64" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">What little you have, becomes mine</text><text x="0" y="96" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Should you eat this week?</text><text x="0" y="128" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">The itch hurts more than hunger, every time.</text><line x1="0" x2="1180" y1="180" y2="180" stroke="#e0dbd2" stroke-width="0.75"></line></g><g transform="translate(0, 760)"><text x="0" y="32" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">When help is few, the counts run high</text><text x="0" y="64" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Gaps in care let risk pass by</text><text x="0" y="96" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Access decides who lives, who dies.</text><text x="0" y="128" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Availability shapes the chance to survive.</text><text x="0" y="160" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Timely care matters.</text><line x1="0" x2="1180" y1="212" y2="212" stroke="#e0dbd2" stroke-width="0.75"></line></g><g transform="translate(0, 1152)"><text x="0" y="32" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">As the masses grow more educated</text><text x="0" y="64" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">My influence fades, the itch is scratched</text><text x="0" y="96" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Some, trapped in a vicious cycle</text><text x="0" y="128" style="font-family: &quot;EB Garamond&quot;, serif; font-size: 17.5px; font-style: normal; font-weight: 400; letter-spacing: 0px;">Never learn better</text></g></svg>
